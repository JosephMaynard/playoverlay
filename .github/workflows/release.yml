name: Release

# Push a tag like v0.15.0 to build Windows, macOS Intel, and macOS Apple
# Silicon binaries and attach them to a draft GitHub release. Review the
# draft on the Releases page and publish it to make it public (the in-app
# update check reads the latest published release).

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Runs once, before anything is built or released: a broken build or a tag
  # that doesn't match package.json's version must never reach a release.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check tag matches package.json version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $pkg_version" >&2
            exit 1
          fi
      - run: npm run ts-check
      - run: npm run lint
      - run: npm test

  create-release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" \
            || gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" \
                 --draft --title "${{ github.ref_name }}" --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
          # Intel build cross-compiles on the arm64 runner: macOS 13 runners
          # are being retired and can queue for hours. Electron cross-arch
          # packaging just downloads the x64 prebuilt, so this is safe.
          - os: macos-latest
            arch: x64
          - os: macos-latest # Apple Silicon
            arch: arm64
          - os: ubuntu-latest
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        # MakerRpm shells out to rpmbuild, which Ubuntu runners don't
        # guarantee; MakerDeb needs dpkg/fakeroot (present, but cheap to pin)
        run: sudo apt-get update && sudo apt-get install -y rpm dpkg fakeroot
      - name: Build distributables
        run: npm run make -- --arch=${{ matrix.arch }}
      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # macOS runners ship bash 3.2 (no globstar), so use find; -print0
          # with xargs -0 handles the space in the Squirrel "... Setup.exe"
          # name, and --clobber makes re-runs idempotent.
          find out/make -type f \( -name '*.exe' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' \) -print0 |
            xargs -0 gh release upload "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" --clobber
